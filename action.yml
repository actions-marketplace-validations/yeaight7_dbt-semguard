name: dbt-semguard
description: Compare dbt Semantic Layer semantics and fail on breaking changes.
branding:
  icon: shield
  color: blue

inputs:
  python-version:
    description: Python version used to run dbt-semguard
    default: "3.12"
  base-ref:
    description: Base git ref for YAML comparison
    required: false
  head-ref:
    description: Head git ref for YAML comparison
    required: false
  project-dir:
    description: dbt project directory
    default: "."
  base-manifest:
    description: Optional base dbt semantic_manifest.json path
    required: false
  head-manifest:
    description: Optional head dbt semantic_manifest.json path
    required: false
  fail-on:
    description: Minimum severity that should fail the action
    default: "breaking"
  pr-comment:
    description: When true, publish or update a sticky PR comment with the semguard report
    default: "false"
  pr-comment-mode:
    description: PR comment behavior when a previous dbt-semguard comment exists
    default: "sticky"
  github-token:
    description: GitHub token used for PR comment publishing
    required: false
  artifact-name:
    description: Name for the uploaded JSON artifact
    default: "semguard-report"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dbt-semguard
      shell: bash
      run: |
        VENV_DIR="$RUNNER_TEMP/dbt-semguard-venv"
        python -m venv "$VENV_DIR"
        "$VENV_DIR/bin/python" -m pip install --upgrade pip
        "$VENV_DIR/bin/python" -m pip install "${{ github.action_path }}"
        echo "$VENV_DIR/bin" >> "$GITHUB_PATH"

    - name: Generate dbt-semguard report
      shell: bash
      run: |
        if [[ -n "${{ inputs.base-manifest }}" || -n "${{ inputs.head-manifest }}" ]]; then
          semguard diff --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --format json > semguard-report.json
          semguard diff --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --format markdown > semguard-report.md
          cat semguard-report.md >> "$GITHUB_STEP_SUMMARY"
        else
          semguard diff --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --format json > semguard-report.json
          semguard diff --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --format markdown > semguard-report.md
          cat semguard-report.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Publish PR comment
      if: ${{ inputs.pr-comment == 'true' }}
      shell: bash
      env:
        SEMGUARD_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        if [[ -z "${{ inputs.github-token }}" ]]; then
          echo "dbt-semguard: skipping PR comment because github-token was not provided."
          exit 0
        fi
        if [[ -z "${{ github.event.pull_request.number }}" ]]; then
          echo "dbt-semguard: skipping PR comment because this run is not attached to a pull request."
          exit 0
        fi
        semguard comment-pr \
          --body-file semguard-report.md \
          --repo "${{ github.repository }}" \
          --pr-number "${{ github.event.pull_request.number }}" \
          --mode "${{ inputs.pr-comment-mode }}"

    - name: Enforce severity threshold
      shell: bash
      run: |
        if [[ -n "${{ inputs.base-manifest }}" || -n "${{ inputs.head-manifest }}" ]]; then
          semguard check --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --fail-on "${{ inputs.fail-on }}"
        else
          semguard check --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --fail-on "${{ inputs.fail-on }}"
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: semguard-report.json
