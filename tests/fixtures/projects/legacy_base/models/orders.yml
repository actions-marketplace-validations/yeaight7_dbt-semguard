semantic_models:
  - name: orders
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: ordered_at
    entities:
      - name: order
        type: primary
        expr: order_id
      - name: customer
        type: foreign
        expr: customer_id
    dimensions:
      - name: ordered_at
        type: time
        type_params:
          time_granularity: day
      - name: country
        type: categorical
        expr: country
    measures:
      - name: gross_revenue
        label: Gross Revenue
        agg: sum
        expr: order_total
        agg_time_dimension: ordered_at
      - name: order_count
        agg: count
        expr: 1
        agg_time_dimension: ordered_at

metrics:
  - name: gross_revenue
    type: simple
    label: Gross Revenue
    filter: order_status = 'completed'
    type_params:
      measure: gross_revenue
      metric_aggregation_params:
        semantic_model: orders
        agg: sum
        agg_time_dimension: ordered_at
        non_additive_dimension: null
  - name: order_count
    type: simple
    type_params:
      measure: order_count
      metric_aggregation_params:
        semantic_model: orders
        agg: count
        agg_time_dimension: ordered_at
        non_additive_dimension: null
  - name: aov
    type: ratio
    label: Average order value
    type_params:
      numerator: gross_revenue
      denominator: order_count
